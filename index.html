<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>콜라브라도 — 콜라보 발매 캘린더</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
  :root{
    --red:#F4473E; --ink:#181513; --paper:#FBF7F0; --card:#FFFFFF;
    --line:#ECE3D6; --muted:#8A8178;
    --c-fashion:#E24B4A; --c-sneaker:#185FA5; --c-ip:#7F47C9; --c-game:#D4537E;
    --c-fnb:#BA7517; --c-living:#7a5a36; --c-etc:#888780;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--paper); color:var(--ink); font-family:'Noto Sans KR',sans-serif; -webkit-font-smoothing:antialiased;}
  .wrap{max-width:1080px; margin:0 auto; padding:0 22px;}
  .disp,.brand b,.hero-txt h1,.tab,.day-date .d,.sec,.modal-body h2{font-family:'Apple SD Gothic Neo','Pretendard',sans-serif; font-weight:800; letter-spacing:-.5px;}

  /* top bar */
  .topbar{display:flex; align-items:center; justify-content:space-between; padding:18px 0; border-bottom:2px solid var(--ink);}
  .brand{display:flex; align-items:center; gap:10px;}
  .brand img{height:30px;}
  .brand b{font-family:'Apple SD Gothic Neo','Pretendard'; font-size:23px; color:var(--red); letter-spacing:-1px;}
  .ig{font-size:13px; color:var(--ink); text-decoration:none; font-weight:700; border:1.5px solid var(--ink); padding:7px 14px; border-radius:999px;}

  /* hero */
  .hero{display:flex; align-items:center; gap:18px; padding:40px 0 26px;}
  .pill{display:inline-block; background:var(--red); color:#fff; font-weight:700; font-size:13px; padding:5px 13px; border-radius:8px; margin-bottom:12px;}
  .hero-txt h1{font-family:'Apple SD Gothic Neo','Pretendard'; font-size:46px; line-height:1.05; letter-spacing:-1px;}
  .hero-txt h1 .r{color:var(--red);}
  .hero-txt p{margin-top:12px; font-size:16px; color:var(--muted); font-weight:500;}
  .hero img{height:150px; margin-left:auto;}

  /* tabs */
  .tabs{display:flex; gap:8px; padding:6px 0 22px;}
  .tab{font-family:'Apple SD Gothic Neo','Pretendard'; font-size:17px; padding:9px 22px; border-radius:999px; border:2px solid var(--ink); background:transparent; cursor:pointer; color:var(--ink);}
  .tab.on{background:var(--ink); color:#fff;}

  /* filter chips */
  .chips{display:flex; flex-wrap:wrap; gap:7px; padding-bottom:26px;}
  .chip{font-size:12.5px; font-weight:700; padding:6px 13px; border-radius:999px; border:1.5px solid var(--line); background:#fff; cursor:pointer; color:#555;}
  .chip.on{border-color:var(--ink); color:var(--ink);}

  /* day group */
  .day{display:grid; grid-template-columns:130px 1fr; gap:18px; padding:22px 0; border-top:1px solid var(--line);}
  .day-date{position:sticky; top:10px;}
  .day-date .d{font-family:'Apple SD Gothic Neo','Pretendard'; font-size:34px; line-height:1;}
  .day-date .m{font-size:13px; color:var(--muted); font-weight:700; margin-top:3px;}
  .day-date .dd{display:inline-block; margin-top:8px; background:var(--red); color:#fff; font-weight:700; font-size:12px; padding:3px 9px; border-radius:999px;}

  .items{display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:12px;}
  .item{position:relative; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:15px 16px; transition:transform .08s;}
  .item:hover{transform:translateY(-2px); border-color:var(--ink);}
  .item.star{border-color:var(--red); border-width:1.5px;}
  .starbadge{position:absolute; top:-9px; left:13px; background:var(--red); color:#fff; font-size:11px; font-weight:700; padding:2px 9px; border-radius:999px;}
  .cat{display:inline-block; font-size:11px; font-weight:700; color:#fff; padding:3px 9px; border-radius:999px; margin-bottom:9px;}
  .item h3{font-size:16.5px; font-weight:700; line-height:1.3; letter-spacing:-.3px;}
  .meta{margin-top:8px; font-size:13px; color:var(--muted); line-height:1.55;}
  .price{margin-top:7px; font-size:13.5px; font-weight:700; color:var(--red);}

  .sec{font-family:'Apple SD Gothic Neo','Pretendard'; font-size:24px; margin:34px 0 4px; display:flex; align-items:baseline; gap:10px; border-top:2px solid var(--ink); padding-top:20px;}
  .sec small{font-family:'Noto Sans KR'; font-size:13px; font-weight:500; color:var(--muted);}
  .ongoing{display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:12px; margin-top:14px;}
  .ocard{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:15px 16px; cursor:pointer; transition:transform .08s;}
  .ocard:hover{transform:translateY(-2px); border-color:var(--ink);}
  .otill{display:inline-block; background:#FFF3F2; color:#A32D2D; border:1px solid #F7C1C1; font-size:11.5px; font-weight:700; padding:3px 9px; border-radius:999px; margin-bottom:9px;}
  .foot{text-align:center; padding:40px 0 50px; color:var(--muted); font-size:13px; border-top:2px solid var(--ink); margin-top:24px;}
  .foot b{color:var(--red); font-family:'Apple SD Gothic Neo','Pretendard'; font-size:16px;}
  .item{cursor:pointer;}
  /* modal */
  .ov{display:none; position:fixed; inset:0; background:rgba(20,15,12,.55); z-index:50; align-items:center; justify-content:center; padding:20px;}
  .ov.on{display:flex;}
  .modal{background:#fff; border-radius:18px; max-width:440px; width:100%; overflow:hidden; max-height:90vh; display:flex; flex-direction:column;}
  .modal-img{aspect-ratio:4/5; background:var(--paper); display:flex; align-items:center; justify-content:center; overflow:hidden; border-bottom:1px solid var(--line);}
  .modal-img img{width:100%; height:100%; object-fit:cover;}
  .modal-img .ph{display:flex; flex-direction:column; align-items:center; gap:8px; color:var(--muted);}
  .modal-img .ph img{width:120px; height:auto; object-fit:contain; opacity:.85;}
  .modal-img .ph span{font-size:13px; font-weight:700;}
  .modal-body{padding:20px 22px 22px; overflow:auto;}
  .modal-body .cat{margin-bottom:10px;}
  .modal-body h2{font-family:'Apple SD Gothic Neo','Pretendard'; font-size:24px; letter-spacing:-.5px; line-height:1.2;}
  .modal-body .desc{margin-top:12px; font-size:14.5px; line-height:1.65; color:#555;}
  .modal-kv{margin-top:16px; border-top:1px solid var(--line); padding-top:14px; font-size:14px;}
  .modal-kv div{display:flex; gap:10px; padding:4px 0;}
  .modal-kv .k{color:var(--muted); font-weight:700; min-width:54px;}
  .modal-note{margin-top:16px; background:#FFF3F2; border:1px solid #F7C1C1; border-radius:10px; padding:11px 13px; font-size:13px; color:#A32D2D; line-height:1.5;}
  .modal-note b{font-weight:700;}
  .modal-cta{margin-top:12px; display:flex; gap:8px;}
  .modal-cta a{flex:1; text-align:center; text-decoration:none; font-weight:700; font-size:14px; padding:12px; border-radius:10px;}
  .modal-cta .ig2{background:var(--red); color:#fff;}
  .modal-cta .buy{border:1.5px solid var(--ink); color:var(--ink);}
  .modal-x{position:absolute; top:18px; right:20px; width:38px; height:38px; border-radius:999px; background:rgba(255,255,255,.9); border:none; font-size:20px; cursor:pointer; z-index:51;}
  @media(max-width:640px){ .hero img{height:96px} .hero-txt h1{font-size:32px} .day{grid-template-columns:74px 1fr} .day-date .d{font-size:24px} }

  /* month grid calendar */
  .gridhead{display:flex; align-items:center; justify-content:center; gap:16px; padding:6px 0 20px;}
  .gridhead button{width:40px; height:40px; border-radius:999px; border:2px solid var(--ink); background:#fff; font-size:19px; cursor:pointer; line-height:1; color:var(--ink);}
  .gridhead button:hover{background:var(--ink); color:#fff;}
  .gridhead .mlabel{font-family:'Apple SD Gothic Neo','Pretendard'; font-weight:800; font-size:25px; min-width:170px; text-align:center; letter-spacing:-.5px;}
  .gridcal{display:grid; grid-template-columns:repeat(7,1fr); gap:6px;}
  .gcwd{text-align:center; font-size:12px; font-weight:700; color:var(--muted); padding:4px 0 6px;}
  .gcwd.sun{color:var(--red);}
  .gcell{min-height:104px; background:var(--card); border:1px solid var(--line); border-radius:11px; padding:7px 7px 8px; display:flex; flex-direction:column; gap:3px; overflow:hidden;}
  .gcell.empty{background:transparent; border:none;}
  .gcell.today{border-color:var(--red); border-width:1.5px;}
  .gcell.past{opacity:.45;}
  .gcell .gdn{font-size:12.5px; font-weight:700; color:var(--ink); margin-bottom:1px;}
  .gcell.today .gdn{color:var(--red);}
  .gcell .gdn.gsun{color:var(--red);}
  .gentry{font-size:10.5px; line-height:1.25; font-weight:600; color:#fff; border-radius:6px; padding:3px 6px; cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; transition:transform .06s;}
  .gentry:hover{transform:translateX(1px);}
  .gentry.star{box-shadow:inset 0 0 0 1.5px var(--red), inset 0 0 0 3px #fff;}
  .gridnote{display:flex; flex-wrap:wrap; gap:12px; justify-content:center; padding:18px 0 4px; font-size:12px; color:var(--muted);}
  .gridnote span{display:inline-flex; align-items:center; gap:5px;}
  .gridnote i{width:11px; height:11px; border-radius:3px; display:inline-block;}
  @media(max-width:640px){
    .gridcal{gap:3px;}
    .gcell{min-height:64px; padding:3px 3px 4px; border-radius:7px; gap:2px;}
    .gcell .gdn{font-size:10px;}
    .gentry{font-size:8px; padding:1px 3px; border-radius:4px;}
    .gridhead .mlabel{font-size:20px; min-width:120px;}
    .gridhead button{width:34px; height:34px; font-size:17px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="brand"><img src="assets/dog.png" alt=""><b>collabrador.</b></div>
    <a class="ig" href="https://instagram.com/collab.rador">@collab.rador →</a>
  </div>

  <div class="hero">
    <div class="hero-txt">
      <span class="pill">콜라보 브리핑</span>
      <h1>다가오는 콜라보<br><span class="r">발매 캘린더</span></h1>
      <p>브랜드 콜라보·한정판·팝업의 <b>실제 발매일</b>만 모았어요. 가장 빠르고 정확하게.</p>
    </div>
    <img src="assets/dog.png" alt="">
  </div>

  <div class="tabs">
    <button class="tab on" data-view="week">이번 주</button>
    <button class="tab" data-view="grid">🗓 월 달력</button>
    <button class="tab" data-view="month">전체 목록</button>
  </div>

  <div class="chips" id="chips"></div>
  <div id="cal"></div>

  <div class="sec" id="ongoing-h">🔥 지금 진행 중<small>발매는 지났지만 아직 구매·체험할 수 있어요</small></div>
  <div class="ongoing" id="ongoing"></div>

  <div class="foot">
    매일 업데이트 · 일정은 브랜드 사정으로 바뀔 수 있어요<br>
    가장 빠른 소식 <b>@collab.rador</b>
  </div>
</div>

<div class="ov" id="ov">
  <button class="modal-x" id="ovx" aria-label="닫기">×</button>
  <div class="modal" id="modal"></div>
</div>

<script src="data.js"></script>
<script>
const IG="https://instagram.com/collab.rador";
const {STARS,POPS,DATA,ONGOING}=window.CAL_DATA;
const isStar=r=>STARS.includes(r.n);
const isPop=r=>POPS.includes(r.n)||r.pop;
const CATS={ "패션":"var(--c-fashion)","스니커":"var(--c-sneaker)","IP/캐릭터":"var(--c-ip)","게임":"var(--c-game)","F&B":"var(--c-fnb)","리빙":"var(--c-living)","기타":"var(--c-etc)" };
const TODAY=(function(){var n=new Date();return new Date(n.getFullYear(),n.getMonth(),n.getDate());})();
let view='week', filter=null, gridMonth=null;
const WD=['일','월','화','수','목','금','토'];

function dday(ds){const t=new Date(ds); const diff=Math.round((t-TODAY)/86400000); return diff<=0?'오늘':('D-'+diff);}

function applyFilter(rows){
  if(filter==='★') return rows.filter(isStar);
  if(filter==='📍') return rows.filter(isPop);
  if(filter) return rows.filter(r=>r.c===filter);
  return rows;
}

function renderGrid(){
  const cal=document.getElementById('cal'); cal.innerHTML='';
  if(!gridMonth) gridMonth=new Date(TODAY.getFullYear(),TODAY.getMonth(),1);
  const y=gridMonth.getFullYear(), mo=gridMonth.getMonth();
  const rows=applyFilter(DATA.slice());
  const byd={};
  rows.forEach(r=>{const t=new Date(r.d); if(t.getFullYear()===y&&t.getMonth()===mo){(byd[t.getDate()]=byd[t.getDate()]||[]).push(r);}});

  const head=document.createElement('div'); head.className='gridhead';
  head.innerHTML=`<button id="gprev" aria-label="이전 달">‹</button><div class="mlabel">${y}년 ${mo+1}월</div><button id="gnext" aria-label="다음 달">›</button>`;
  cal.appendChild(head);

  const grid=document.createElement('div'); grid.className='gridcal';
  WD.forEach((w,i)=>{const h=document.createElement('div'); h.className='gcwd'+(i===0?' sun':''); h.textContent=w; grid.appendChild(h);});
  const first=new Date(y,mo,1).getDay();
  const dim=new Date(y,mo+1,0).getDate();
  for(let i=0;i<first;i++){const e=document.createElement('div'); e.className='gcell empty'; grid.appendChild(e);}
  for(let d=1;d<=dim;d++){
    const cdate=new Date(y,mo,d);
    const isToday=cdate.getTime()===TODAY.getTime();
    const isPast=cdate<TODAY;
    const dow=cdate.getDay();
    const cell=document.createElement('div');
    cell.className='gcell'+(isToday?' today':'')+(isPast?' past':'');
    let html=`<div class="gdn${dow===0?' gsun':''}">${d}</div>`;
    (byd[d]||[]).forEach(r=>{
      html+=`<div class="gentry${isStar(r)?' star':''}" style="background:${CATS[r.c]||'var(--c-etc)'}" data-i="${DATA.indexOf(r)}">${isPop(r)?'📍 ':''}${r.n}</div>`;
    });
    cell.innerHTML=html;
    grid.appendChild(cell);
  }
  cal.appendChild(grid);

  const note=document.createElement('div'); note.className='gridnote';
  note.innerHTML=Object.keys(CATS).map(c=>`<span><i style="background:${CATS[c]}"></i>${c}</span>`).join('')+`<span><i style="box-shadow:inset 0 0 0 1.5px var(--red),inset 0 0 0 3px #fff;background:#ccc"></i>★ 주목</span>`;
  cal.appendChild(note);

  cal.querySelectorAll('.gentry').forEach(el=>el.onclick=()=>openModal(DATA[+el.dataset.i]));
  document.getElementById('gprev').onclick=()=>{gridMonth=new Date(y,mo-1,1); renderGrid();};
  document.getElementById('gnext').onclick=()=>{gridMonth=new Date(y,mo+1,1); renderGrid();};
}

function render(){
  if(view==='grid'){ renderGrid(); return; }
  const cal=document.getElementById('cal'); cal.innerHTML='';
  let rows=DATA.slice();
  if(view==='week'){const end=new Date(TODAY); end.setDate(end.getDate()+7); rows=rows.filter(r=>{const t=new Date(r.d); return t>=TODAY && t<=end;});}
  if(filter==='★') rows=rows.filter(isStar);
  else if(filter==='📍') rows=rows.filter(isPop);
  else if(filter) rows=rows.filter(r=>r.c===filter);
  const groups={}; rows.forEach(r=>{(groups[r.d]=groups[r.d]||[]).push(r);});
  const days=Object.keys(groups).sort();
  if(!days.length){cal.innerHTML='<div style="padding:50px 0;color:var(--muted)">해당 조건의 발매가 없어요.</div>';return;}
  days.forEach(ds=>{
    const t=new Date(ds);
    const el=document.createElement('div'); el.className='day';
    el.innerHTML=`<div class="day-date"><div class="d disp">${t.getMonth()+1}/${t.getDate()}</div><div class="m">${WD[t.getDay()]}요일</div><div class="dd">${dday(ds)}</div></div>
      <div class="items">${groups[ds].map(r=>`
        <div class="item${isStar(r)?' star':''}" data-i="${DATA.indexOf(r)}">
          ${isStar(r)?'<span class="starbadge">★ 주목</span>':''}
          <span class="cat" style="background:${CATS[r.c]}">${r.c}</span>${isPop(r)?' <span class="cat" style="background:#0F6E56">📍 팝업</span>':''}
          <h3>${r.n}</h3>
          <div class="meta">${r.w||'발매처 확인 중'}</div>
          ${r.p?`<div class="price">${r.p}</div>`:''}
        </div>`).join('')}</div>`;
    cal.appendChild(el);
  });
  cal.querySelectorAll('.item').forEach(it=>it.onclick=()=>openModal(DATA[+it.dataset.i]));
}

function renderOngoing(){
  const box=document.getElementById('ongoing');
  box.innerHTML=ONGOING.map((r,i)=>`
    <div class="ocard" data-o="${i}">
      <span class="otill">⏳ ${r.till}</span>
      <span class="cat" style="background:${CATS[r.c]}">${r.c}</span>${isPop(r)?' <span class="cat" style="background:#0F6E56">📍 팝업</span>':''}
      <h3 style="font-size:16px;font-weight:700;line-height:1.3;margin-top:7px">${r.n}</h3>
      <div class="meta" style="margin-top:7px;font-size:13px;color:var(--muted)">${r.w}</div>
      ${r.p?`<div class="price" style="margin-top:6px;font-size:13px;font-weight:700;color:var(--red)">${r.p}</div>`:''}
    </div>`).join('');
  box.querySelectorAll('.ocard').forEach(c=>c.onclick=()=>openModal({...ONGOING[+c.dataset.o], d:null, _ongoing:true}));
}

function fmtDate(ds){const t=new Date(ds); return `${t.getFullYear()}.${t.getMonth()+1}.${t.getDate()} (${WD[t.getDay()]})`;}
function openModal(r){
  const m=document.getElementById('modal');
  const imgHtml = r.img
    ? `<img src="${r.img}" alt="">`
    : `<div class="ph"><img src="assets/dog.png" alt=""><span>카드 준비 중</span></div>`;
  m.innerHTML=`
    <div class="modal-img">${imgHtml}</div>
    <div class="modal-body">
      <span class="cat" style="background:${CATS[r.c]}">${r.c}</span>${isStar(r)?' <span class="cat" style="background:var(--red)">★ 주목</span>':''}
      <h2>${r.n}</h2>
      ${r.desc?`<div class="desc">${r.desc}</div>`:''}
      <div class="modal-kv">
        <div><span class="k">${r._ongoing?'진행':'발매일'}</span><span>${r._ongoing?('진행 중 · '+r.till):(fmtDate(r.d)+' · '+dday(r.d))}</span></div>
        <div><span class="k">어디서</span><span>${r.w||'확인 중'}</span></div>
        <div><span class="k">가격</span><span>${r.p||'미정'}</span></div>
      </div>
      <div class="modal-note">📣 <b>@collab.rador 팔로우</b>하면, 발매 <b>전날 스토리</b>로 알려드려요. (별도 가입·알림 설정 없음)</div>
      <div class="modal-cta">
        <a class="ig2" href="${r.ig||IG}" target="_blank" rel="noopener">인스타에서 보기</a>
        <a class="buy" id="shareBtn">공유</a>
      </div>
    </div>`;
  document.getElementById('shareBtn').onclick=()=>{
    const url=r.ig||IG;
    const txt=`${r.n} — ${fmtDate(r.d)} 발매 · 콜라브라도 발매 캘린더`;
    if(navigator.share){navigator.share({title:r.n,text:txt,url}).catch(()=>{});}
    else{navigator.clipboard&&navigator.clipboard.writeText(txt+' '+url);const b=document.getElementById('shareBtn');b.textContent='복사됨!';setTimeout(()=>b.textContent='공유',1200);}
  };
  document.getElementById('ov').classList.add('on');
}
const ov=document.getElementById('ov');
document.getElementById('ovx').onclick=()=>ov.classList.remove('on');
ov.onclick=e=>{if(e.target===ov)ov.classList.remove('on');};
const chips=document.getElementById('chips');
chips.innerHTML=`<button class="chip on" data-c="">전체</button><button class="chip" data-c="★" style="border-color:var(--red);color:var(--red)">★ 주목</button><button class="chip" data-c="📍">📍 오프라인 팝업</button>`+Object.keys(CATS).map(c=>`<button class="chip" data-c="${c}">${c}</button>`).join('');
chips.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{chips.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));b.classList.add('on');filter=b.dataset.c||null;render();});
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));b.classList.add('on');view=b.dataset.view;render();});
render();
renderOngoing();
</script>
</body>
</html>
